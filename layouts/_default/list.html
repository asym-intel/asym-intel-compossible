{{ define "main" }}
<main class="list">
  <div class="list__header">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="list__description">{{ . }}</div>{{ end }}
  </div>
  <div class="list__posts">
    {{ range .Pages.ByDate.Reverse }}
    <article class="feed-card">
      <div class="feed-card__meta">
        <time class="feed-card__date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time>
      </div>
      <h2 class="feed-card__title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ with .Params.excerpt }}<p class="feed-card__summary">{{ . | truncate 160 }}</p>{{ end }}
      <a class="feed-card__read-more" href="{{ .RelPermalink }}">Read →</a>
    </article>
    {{ end }}
  </div>
</main>
{{ end }}
