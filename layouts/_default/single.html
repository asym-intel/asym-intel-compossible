{{ define "main" }}
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Article","headline":{{ .Title | jsonify }},"datePublished":"{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}","dateModified":"{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}","url":"{{ .Permalink }}","publisher":{"@type":"Person","name":"Peter Howitt","url":"https://compossible.asym-intel.info"}}
</script>
<main class="single"><article class="post">
  <header class="post__header">
    <div class="post__meta">
      <time class="post__date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time>
      {{ with .Params.categories }}<span class="post__categories">{{ delimit . " · " }}</span>{{ end }}
    </div>
    <h1 class="post__title">{{ .Title }}</h1>
    {{ with .Params.excerpt }}<p class="post__summary">{{ . }}</p>{{ end }}
  </header>
  <div class="post__body">{{ .Content }}</div>
  <footer class="post__footer">
    {{ with .Params.tags }}<div class="post__tags">{{ range . }}<a href="/tags/{{ . | urlize }}/" class="post__tag">{{ . }}</a>{{ end }}</div>{{ end }}
    <a class="post__back" href="/">← All posts</a>
  </footer>
</article></main>
{{ end }}
