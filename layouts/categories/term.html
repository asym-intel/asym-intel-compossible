{{ define "main" }}
<section class="home__hero"><div class="container">
  <p class="home__subtitle">Category: <strong>{{ .Title }}</strong> &mdash; {{ len .Pages }} post{{ if ne (len .Pages) 1 }}s{{ end }}</p>
</div></section>

<section class="home__feed"><div class="container">
  {{ partial "view-toggle.html" (dict
    "pages"   .Pages.ByDate.Reverse
    "default" "tile"
    "heading" .Title
  ) }}
</div></section>
{{ end }}
