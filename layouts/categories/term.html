{{ define "main" }}
<section class="home__hero"><div class="container">
  <p class="home__subtitle">Category: <strong>{{ .Title }}</strong></p>
</div></section>

<section class="home__feed"><div class="container">
  <h2 class="home__feed-heading">{{ len .Pages }} post{{ if ne (len .Pages) 1 }}s{{ end }}</h2>
  {{ partial "feed-cards.html" (.Pages.ByDate.Reverse) }}
</div></section>
{{ end }}
